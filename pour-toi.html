<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>✨ Pour toi</title>
<meta name="theme-color" content="#1a0b2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta property="og:title" content="J'ai quelque chose à te dire…">
<meta property="og:description" content="Ouvre, et laisse-toi guider ✨">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;600;700&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="pour-toi.css">
</head>
<body>

<canvas id="fx"></canvas>

<!-- Music toggle -->
<button class="music-toggle" id="musicToggle" aria-label="Activer / couper la musique" hidden>
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
</button>

<!-- INTRO -->
<section class="screen screen--intro" id="intro">
  <div class="intro__inner">
    <div class="intro__spark">✨</div>
    <h1 class="intro__title" id="introTitle">Pour toi</h1>
    <p class="intro__text">J'ai préparé un petit voyage,<br>rien que pour toi.</p>
    <button class="btn-begin" id="beginBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3l14 9-14 9V3z"></path></svg>
      Commencer le voyage
    </button>
    <p class="intro__hint">🎧 mets le son, c'est mieux</p>
  </div>
</section>

<!-- JOURNEY -->
<section class="screen screen--journey hidden" id="journey">
  <div class="slide-wrap" id="slideWrap"></div>

  <div class="journey__nav">
    <div class="dots" id="dots"></div>
    <button class="btn-next" id="nextBtn">
      Suivant
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"></path></svg>
    </button>
  </div>
</section>

<!-- FINAL -->
<section class="screen screen--final hidden" id="final">
  <div class="final__inner">
    <h2 class="final__q" id="finalQ"></h2>
    <div class="final__btns" id="finalBtns">
      <button class="btn-yes" id="yesBtn">Oui 💖</button>
      <button class="btn-no" id="noBtn">Non</button>
    </div>
    <div class="final__answer" id="finalAnswer" hidden>
      <div class="final__big">❤️</div>
      <p id="finalMsg"></p>
      <p class="final__sign" id="finalSign"></p>
    </div>
  </div>
</section>

<script src="pour-toi.js"></script>
</body>
</html>
